*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0a;color:#e8e8e8;min-height:100vh;padding:2rem 1rem}
.container{max-width:600px;margin:0 auto}
h1{font-size:18px;font-weight:600;margin-bottom:2rem;color:#fff;letter-spacing:-0.01em}
.step-bar{display:flex;align-items:center;gap:6px;margin-bottom:2rem;overflow-x:auto;padding-bottom:4px}

.qs{font-size:14px;color:#888;margin-bottom:1.5rem;line-height:1.6}
.og{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:1.5rem}
.ob{background:#111;border:1px solid #222;border-radius:12px;padding:16px;text-align:left;cursor:pointer;transition:border-color .15s,background .15s}
.ob:hover{border-color:#444;background:#161616}

.ol{font-size:14px;font-weight:500;color:#e8e8e8;margin-bottom:3px}

.rl{font-size:11px;color:#555;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.cb{background:#161616;border-radius:8px;padding:14px 60px 14px 16px;font-size:13px;color:#e8e8e8;line-height:1.8;position:relative;white-space:pre-wrap}
.cpb{position:absolute;top:10px;right:10px;background:#111;border:1px solid #333;border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;color:#888}
.cpb:hover{color:#e8e8e8;border-color:#555}
.clb{display:flex;align-items:center;gap:12px;background:#111;border:1px solid #2a2a2a;border-radius:12px;padding:14px 18px;cursor:pointer;margin-top:12px;text-decoration:none;width:100%;transition:background .15s,border-color .15s}

.clt{flex:1}
.cll{font-size:14px;font-weight:500;color:#e8e8e8}
.cld{font-size:12px;color:#666;margin-top:2px}
.al{list-style:none}
.al li{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid #1a1a1a;font-size:14px;color:#e8e8e8;line-height:1.5}
.al li:last-child{border-bottom:none}
.nm{width:22px;height:22px;border-radius:50%;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:#888;flex-shrink:0;margin-top:1px}
.badge{display:inline-block;font-size:11px;padding:3px 10px;border-radius:6px;font-weight:500}
.ba{background:#0d2818;color:#4ade80}
.bb{background:#1a1200;color:#facc15}
.bc{background:#1a1a1a;color:#888}
.nr{display:flex;gap:10px;margin-top:1.5rem;flex-wrap:wrap}
.bn{background:#111;border:1px solid #222;border-radius:8px;padding:8px 16px;font-size:13px;cursor:pointer;color:#888;transition:color .15s,border-color .15s}
.bn:hover{color:#e8e8e8;border-color:#444}
.ib{background:#0a1a2a;border-radius:8px;padding:12px 16px;font-size:13px;color:#60a5fa;margin-bottom:1rem;line-height:1.6}

function cpy(id,btn){
  const t=document.getElementById(id).getAttribute('data-text');
  navigator.clipboard.writeText(t).then(()=>{btn.textContent='복사됨';setTimeout(()=>btn.textContent='복사',1500);});
}
function cbox(id,text){
  const esc=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return `<div class="cb" id="${id}" data-text="${text.replace(/"/g,'&quot;')}">${esc}<button class="cpb" onclick="cpy('${id}',this)">복사</button></div>`;
}
function clBtn(){
  return `<div class="clb" onclick="copyCL(this)" style="cursor:pointer">
    <i class="ti ti-clipboard-list" style="font-size:22px;color:#555"></i>
    <div class="clt"><div class="cll">체크리스트 복사</div><div class="cld">누르면 클립보드에 복사돼요 → 바로 붙여넣기 전송</div></div>
    <i class="ti ti-copy" style="font-size:16px;color:#444"></i>
  </div>`;
}
function copyCL(el){
  navigator.clipboard.writeText(CL_TEXT).then(()=>{
    const lbl=el.querySelector('.cll');
    const desc=el.querySelector('.cld');
    lbl.textContent='복사됐어요!';
    desc.textContent='카카오·인스타에 바로 붙여넣기하세요';
    setTimeout(()=>{lbl.textContent='체크리스트 복사';desc.textContent='누르면 클립보드에 복사돼요 → 바로 붙여넣기 전송';},2000);
  });
}
function renderStepBar(){
  document.getElementById('stepbar').innerHTML=STEPS.map((l,i)=>{
    let c='sd';
    if(i<S.step)c+=' done';
    else if(i===S.step)c+=' active';
    const inn=i<S.step?'<i class="ti ti-check" style="font-size:12px"></i>':(i+1);
    return (i>0?'<div class="sl"></div>':'')+`<div class="${c}" title="${l}">${inn}</div>`;
  }).join('');
}

    </div>`;
  } else if(S.step===3){
    c=`<div class="lbl">step 4 / ${STEPS.length}</div>
    <div class="qt">체크리스트 제출했나요?</div>
    <div class="qs">상대방이 체크리스트를 작성해서 제출했는지 확인하세요</div>
    <div class="og">
      <div class="ob" onclick="go('checklist','done')"><div class="oi"><i class="ti ti-circle-check"></i></div><div class="ol">제출 완료</div><div class="od">체크리스트 내용 확인 가능</div></div>
      <div class="ob" onclick="go('checklist','pending')"><div class="oi"><i class="ti ti-clock"></i></div><div class="ol">미제출 / 무응답</div><div class="od">아직 응답이 없는 상태</div></div>
    </div>
    <div class="nr"><button class="bn" onclick="back()"><i class="ti ti-arrow-left" style="font-size:13px;vertical-align:-2px;margin-right:4px"></i>이전</button></div>`;
  } else if(S.step===4){
    if(S.checklist==='pending'){
      c=`<div class="lbl">step 4 / ${STEPS.length} — 미제출</div>
      <div class="qt">리마인드 문구 전송</div>
      <div class="qs">1차 응대 후 3~5일 내 한 번만 리마인드하세요. 두 번 이상은 하지 마세요.</div>
      <div class="rc hi"><div class="rl">리마인드 문구</div>${cbox('tmpl_remind',REMIND)}${clBtn()}</div>
      <div class="ib"><i class="ti ti-info-circle" style="font-size:15px;vertical-align:-2px;margin-right:6px"></i>리마인드 후에도 무응답이면 C등급으로 분류하고 3~4주 후 재컨택 여부를 판단하세요.</div>
      <div class="nr">
        <button class="bn" onclick="back()"><i class="ti ti-arrow-left" style="font-size:13px;vertical-align:-2px;margin-right:4px"></i>이전</button>
        <button class="bn" onclick="go('lead','C')">리마인드 후에도 무응답 →</button>
      </div>`;
    } else {
      c=`<div class="lbl">step 5 / ${STEPS.length}</div>
      <div class="qt">리드 등급을 판단하세요</div>
      <div class="qs">체크리스트 내용을 보고 선택하세요</div>
      <div class="og">
        <div class="ob" onclick="go('lead','A')"><div class="oi"><i class="ti ti-flame"></i></div><div class="ol">A등급</div><div class="od">운영 중, 개선 의지 높음, 예산 가능, 빠른 진행</div></div>
        <div class="ob" onclick="go('lead','B')"><div class="oi"><i class="ti ti-search"></i></div><div class="ol">B등급</div><div class="od">탐색 단계, 방향 고민 중, 추후 가능성</div></div>
        <div class="ob" onclick="go('lead','C')"><div class="oi"><i class="ti ti-coins"></i></div><div class="ol">C등급</div><div class="od">가격 비교, 실행 의지 낮음</div></div>
      </div>
      <div class="nr"><button class="bn" onclick="back()"><i class="ti ti-arrow-left" style="font-size:13px;vertical-align:-2px;margin-right:4px"></i>이전</button></div>`;
    }
  } else if(S.step===5){
    const al=ACT[S.type][S.lead]||[];
    const bc='b'+S.lead.toLowerCase();
    c=`<div class="lbl">step 6 / ${STEPS.length} — 완료</div>
    <div class="qt">후속 응대 가이드</div>
    <div style="margin-bottom:1.25rem">
      <span class="badge ${bc}">${S.lead}등급</span>
      <span style="font-size:13px;color:#666;margin-left:8px">${S.type==='inbound'?'인바운드':'아웃바운드'} · ${S.channel}</span>
    </div>
    <div class="rc hi"><div class="rl">체크리스트 확인 후 후속 문구</div>${cbox('tmpl_follow',FOLLOW[S.type][S.lead])}</div>
    <div class="rc"><div class="rl">지금 해야 할 액션</div>
      <ul class="al">${al.map((a,i)=>`<li><span class="nm">${i+1}</span>${a}</li>`).join('')}</ul>
    </div>
    <div class="nr">
      <button class="bn" onclick="reset()"><i class="ti ti-refresh" style="font-size:13px;vertical-align:-2px;margin-right:4px"></i>처음부터</button>
      <button class="bn" onclick="back()"><i class="ti ti-arrow-left" style="font-size:13px;vertical-align:-2px;margin-right:4px"></i>이전</button>
    </div>`;
  }
  app.innerHTML=c;
}
function go(k,v){S[k]=v;S.step++;render();}
function back(){
  S.step--;
  if(S.step<=0){S.step=0;S.type=null;S.channel=null;S.checklist=null;S.lead=null;}
  if(S.step===1){S.channel=null;S.checklist=null;S.lead=null;}
  if(S.step===2){S.checklist=null;S.lead=null;}
  if(S.step===3){S.checklist=null;S.lead=null;}
  if(S.step===4){S.lead=null;}
  render();
}
function reset(){S.step=0;S.type=null;S.channel=null;S.checklist=null;S.lead=null;render();}
render();
</script>
</body>
</html>
